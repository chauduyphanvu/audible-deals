name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run `deals find --genre sci-fi`, I get..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: The exact command(s) you ran.
      placeholder: |
        1. `deals find --genre sci-fi --max-price 5`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste any error messages or tracebacks.
      render: shell

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Pre-built binary
        - pip install
        - From source
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Run `deals --version` to check."
      placeholder: "0.3.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11, etc."
    validations:
      required: true
