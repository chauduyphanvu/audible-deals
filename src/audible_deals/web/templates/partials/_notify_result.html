<div class="animate-fade-in">
  {% if error %}
  <div class="flex items-start gap-3 px-4 py-3 rounded-lg text-sm bg-red-50 text-red-800 border border-red-200">
    <svg class="w-4 h-4 mt-0.5 flex-shrink-0 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    {{ error }}
  </div>
  {% elif info %}
  <div class="flex items-start gap-3 px-4 py-3 rounded-lg text-sm bg-blue-50 text-blue-800 border border-blue-200">
    <svg class="w-4 h-4 mt-0.5 flex-shrink-0 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    {{ info }}
  </div>
  {% elif sent > 0 %}
  <div class="flex items-start gap-3 px-4 py-3 rounded-lg text-sm bg-green-50 text-green-800 border border-green-200">
    <svg class="w-4 h-4 mt-0.5 flex-shrink-0 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    Sent {{ sent }} deal{{ 's' if sent != 1 else '' }} to webhook successfully.
  </div>
  {% endif %}
</div>
