{% if error %}
<div class="px-4 py-3 rounded-lg bg-red-50 text-red-800 border border-red-200 text-sm">
    {{ error }}
</div>
{% elif not categories %}
<div class="flex items-center justify-center h-32 text-surface-400 text-sm border-2 border-dashed border-surface-200 rounded-xl">
    No subcategories found.
</div>
{% else %}
<div class="grid grid-cols-1 sm:grid-cols-2 gap-3 animate-fade-in">
    {% for cat in categories %}
    <div class="bg-white border border-surface-200 rounded-xl p-4 hover:border-brand-300 hover:shadow-sm transition-all group">
        <div class="mb-3">
            <p class="font-semibold text-surface-900 text-sm leading-snug group-hover:text-brand-700 transition-colors">{{ cat.name }}</p>
            <p class="text-xs text-surface-400 font-mono mt-0.5">{{ cat.id }}</p>
        </div>
        <div class="flex gap-2">
            <button
                hx-get="/hx/categories?parent={{ cat.id | urlencode }}"
                hx-target="#subcategory-panel"
                hx-swap="innerHTML"
                hx-indicator="#sub-loading"
                onclick="pushBreadcrumb('{{ cat.name | replace("'", "\\'") }}', '{{ cat.id }}')"
                class="flex-1 text-xs font-medium px-2.5 py-1.5 rounded-lg bg-surface-100 hover:bg-brand-50 hover:text-brand-700 text-surface-600 transition-colors text-center"
            >
                Browse
            </button>
            <a
                href="/find?category={{ cat.id | urlencode }}"
                class="flex-1 text-xs font-medium px-2.5 py-1.5 rounded-lg bg-brand-600 hover:bg-brand-700 text-white transition-colors text-center"
            >
                Find deals
            </a>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
