{% extends "base.html" %}
{% block title %}Watch Prices — Audible Deals{% endblock %}

{% block content %}
<div class="space-y-6">

  <!-- Page header -->
  <div>
    <h1 class="text-2xl font-bold text-surface-900">Watch Prices</h1>
    <p class="text-sm text-surface-500 mt-0.5">Check your wishlist against current Audible prices</p>
  </div>

  <!-- Controls bar -->
  <div class="bg-white rounded-xl border border-surface-200 shadow-sm p-4 flex flex-col sm:flex-row items-start sm:items-center gap-4">

    <!-- Check prices button -->
    <button
      hx-get="/hx/watch/check"
      hx-target="#watch-results"
      hx-swap="innerHTML"
      hx-indicator="#check-indicator"
      class="inline-flex items-center gap-2 px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold rounded-lg transition-colors shadow-sm">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
      </svg>
      Check Prices Now
      <span id="check-indicator" class="htmx-indicator">
        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
        </svg>
      </span>
    </button>

    <div class="text-surface-300 hidden sm:block">|</div>

    <!-- Webhook form -->
    <form
      hx-post="/hx/notify"
      hx-target="#notify-result"
      hx-swap="innerHTML"
      hx-indicator="#notify-indicator"
      class="flex flex-1 flex-col sm:flex-row gap-2 items-start sm:items-center">
      <div class="flex-1 min-w-0 w-full sm:w-auto">
        <input name="webhook" type="url" placeholder="https://hooks.slack.com/services/…"
               class="w-full px-3 py-2 text-sm border border-surface-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent placeholder-surface-300">
      </div>
      <button type="submit"
              class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-surface-200 hover:bg-surface-50 text-surface-700 text-sm font-medium rounded-lg transition-colors shadow-sm whitespace-nowrap">
        <svg class="w-4 h-4 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        Send Notification
        <span id="notify-indicator" class="htmx-indicator">
          <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </span>
      </button>
    </form>
  </div>

  <!-- Notify result area -->
  <div id="notify-result"></div>

  <!-- Results area -->
  <div id="watch-results">
    <!-- Initial prompt -->
    <div class="flex flex-col items-center justify-center py-20 text-center rounded-xl border border-dashed border-surface-200 bg-white">
      <div class="w-14 h-14 rounded-full bg-brand-50 flex items-center justify-center mb-4">
        <svg class="w-7 h-7 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
      </div>
      <p class="text-surface-700 font-semibold text-lg">Ready to check prices</p>
      <p class="text-surface-400 text-sm mt-1 max-w-sm">
        Click <strong>Check Prices Now</strong> to fetch live prices for all items on your wishlist.
      </p>
    </div>
  </div>

</div>
{% endblock %}
